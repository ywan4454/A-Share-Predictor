name: Morning Prediction (A-Share Lead-Lag)

on:
  schedule:
    # 北京时间 09:10 = UTC 01:10，仅工作日（周一至周五）
    - cron: '10 1 * * 1-5'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest

    env:
      WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning prediction
        run: python generate_report.py

      - name: Commit and push predictions cache
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f data/prediction_history.json data/daily_report.md
          git commit -m "chore: update daily predictions cache [skip ci]" || echo "No changes to commit"
          git push
